colorScheme = "ocean"
defaultAppearance = "dark"
autoSwitchAppearance = true

logo = "images/avatar.jpg"
disableTextInHeader = false

enableSearch = true
enableCodeCopy = true

[author]
  name = "Đức Quân"
  image = "images/avatar.jpg"
  headline = "ERP · IFS Cloud · Business Analysis"
  bio = "Chuyện nghề BA trong lĩnh vực sản xuất. Viết cho mình, và cho cả những ai đang muốn dấn thân vào con đường này."
  links = [
    { x-twitter = "https://x.com/quannkiu" },
    { linkedin = "https://www.linkedin.com/in/quandd/" },
    { facebook = "https://www.facebook.com/kiu98/" },
  ]

[header]
  layout = "fixed"
  showTitle = true

[footer]
  showCopyright = true
  showThemeAttribution = false
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "custom"
  homepageImage = "/img/background.svg"
  showRecent = true
  showRecentItems = 5
  showMoreLink = true
  showMoreLinkDest = "/posts"
  cardView = true
  cardViewScreenWidth = false
  layoutBackgroundBlur = true

[article]
  showDate = true
  showAuthor = true
  showBreadcrumbs = true
  showReadingTime = true
  showTableOfContents = false
  showTaxonomies = true
  showWordCount = false
  showHero = true
  heroStyle = "background"
  layoutBackgroundBlur = true
  sharingLinks = ["x-twitter", "linkedin", "facebook"]

[list]
  showBreadcrumbs = true
  showSummary = true
  groupByYear = true
  cardView = true
