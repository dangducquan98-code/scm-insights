{{ $subscribed := .QueryParam "subscribed" }}
{{ if eq $subscribed "ok" }}
<div style="margin: 1em 0; padding: 12px 18px; background: rgba(52,199,89,0.1); border: 1px solid rgba(52,199,89,0.3); border-radius: 8px; color: #34c759;">
  ✅ Đã đăng ký! Kiểm tra email xác nhận nhé.
</div>
{{ else if eq $subscribed "error" }}
<div style="margin: 1em 0; padding: 12px 18px; background: rgba(255,59,48,0.1); border: 1px solid rgba(255,59,48,0.3); border-radius: 8px; color: #ff3b30;">
  ❌ Có lỗi. Thử lại hoặc liên hệ mình qua X nhé.
</div>
{{ end }}
